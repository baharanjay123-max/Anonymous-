<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APOCALYPSE SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
  color: #ff0000;
}

/* RED MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* APOCALYPSE SHAKE */
.shake {
  animation: shake 0.05s infinite;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}

/* TERMINAL */
.terminal {
  position: relative;
  z-index: 2;
  padding: 20px;
}

.line {
  white-space: pre-wrap;
  text-shadow: 0 0 10px #ff0000;
}

.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { text-shadow: 3px 0 white, -3px 0 black; }
  20% { text-shadow: -3px 0 white, 3px 0 black; }
  40% { text-shadow: 3px 3px white, -3px -3px black; }
  60% { text-shadow: -2px 0 white, 2px 0 black; }
  80% { text-shadow: 2px -2px white, -2px 2px black; }
  100% { text-shadow: 3px 0 white, -3px 0 black; }
}

/* INPUT */
.input {
  display: flex;
  margin-top: 10px;
}

input {
  background: none;
  border: none;
  outline: none;
  color: #ff0000;
  font-family: monospace;
  width: 100%;
}

/* WARNING SCREEN */
.warning {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 12px;
  color: red;
  opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="warning">
[!!! SYSTEM APOCALYPSE ACTIVE !!!]
REALITY STABILITY: CRITICAL
</div>

<div class="terminal">
  <div id="output"></div>

  <div class="input">
    <span>&gt;</span>
    <input id="cmd" autocomplete="off" autofocus>
  </div>
</div>

<script>

/* RED MATRIX CHAOS */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let chars = "01!@#$%^&*ABCDEFGHIJKLMNOPQRSTUVWXYZ";
chars = chars.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff0000";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const t = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(t,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.97){
      drops[i]=0;
    }
    drops[i]++;
  }
}
setInterval(draw,15);

/* TERMINAL */
const output = document.getElementById("output");
const cmd = document.getElementById("cmd");

function print(t){
  const d = document.createElement("div");
  d.classList.add("line","glitch");
  d.textContent = t;
  output.appendChild(d);
  window.scrollTo(0,document.body.scrollHeight);
}

/* APOCALYPSE EVENTS */
function chaos(){
  const events = [
    "[WORLD] system fragmentation detected...",
    "[AI] WARNING: reality unstable",
    "[CORE] memory corruption spreading...",
    "[GRID] nodes collapsing...",
    "[ERROR] cannot maintain structure..."
  ];
  print(events[Math.floor(Math.random()*events.length)]);
}
setInterval(chaos,3000);

/* BOOT SEQUENCE */
const boot = [
"[APOCALYPSE MODE] INITIALIZING...",
"[SYSTEM] breaking global structure...",
"[SYSTEM] deleting stability layer...",
"[WARNING] irreversible damage detected...",
"[AI] NO CONTROL ANYMORE...",
"[STATUS] END OF SYSTEM ✔"
];

let i=0;
function bootAnim(){
  if(i<boot.length){
    print(boot[i]);
    i++;
    setTimeout(bootAnim,300);
  } else {
    print("SYSTEM: type anything... nothing matters anymore.");
  }
}
bootAnim();

/* COMMANDS */
cmd.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    let v = cmd.value.trim();
    print("> "+v);

    if(v==="clear"){
      output.innerHTML="";
    }
    else if(v==="status"){
      document.body.classList.add("shake");
      print("REALITY: DESTROYED");
      print("SYSTEM: UNSTABLE");
    }
    else if(v==="restore"){
      print("attempting restore...");
      setTimeout(()=>print("FAILED ❌"),1000);
    }
    else if(v==="help"){
      print("commands: status / restore / clear");
    }
    else {
      print("[ERROR] world cannot process request");
    }

    cmd.value="";
  }
});
</script>

</body>
</html>
